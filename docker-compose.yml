version: '3.8'

services:
  python311:
    build:
      context: .
      dockerfile: docker/Dockerfile.311
    container_name: pysymex-python311
    working_dir: /workspace
    volumes:
      - .:/workspace
    stdin_open: true
    tty: true
    restart: unless-stopped

  python312:
