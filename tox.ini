[tox]
requires = tox-uv
envlist = py311,py312,py313
isolated_build = true
skip_missing_interpreters = true

[testenv]
description = Run the CI-equivalent test command for each Python version.
deps =
    .[dev]
setenv =
    PYTHONDONTWRITEBYTECODE = 1
commands =
    pytest {posargs:tests/ -v --tb=short -n auto -m "not slow" --ignore=tests/test_resources.py --cov=pysymex --cov-report=xml --cov-branch -x}

